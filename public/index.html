<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebMCP Chatbot Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e1e4e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      width: 100%;
      max-width: 720px;
      margin-bottom: 20px;
    }

    header h1 { font-size: 1.25rem; font-weight: 600; color: #fff; }
    header p  { font-size: 0.8rem; color: #8b949e; margin-top: 4px; }

    #chat-window {
      flex: 1;
      width: 100%;
      max-width: 720px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
      padding-bottom: 16px;
    }

    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .bubble.user {
      align-self: flex-end;
      background: #1f6feb;
      color: #fff;
      border-bottom-right-radius: 3px;
    }

    .bubble.assistant {
      align-self: flex-start;
      background: #161b22;
      border: 1px solid #30363d;
      border-bottom-left-radius: 3px;
    }

    /* Tool-call trace shown below the assistant answer */
    .tool-trace {
      align-self: flex-start;
      width: 100%;
      max-width: 85%;
    }

    .tool-trace details {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      font-size: 0.78rem;
    }

    .tool-trace summary {
      padding: 6px 10px;
      cursor: pointer;
      color: #58a6ff;
      user-select: none;
    }

    .tool-trace summary:hover { text-decoration: underline; }

    .tool-entry {
      padding: 8px 10px;
      border-top: 1px solid #21262d;
    }

    .tool-name { color: #d2a8ff; font-weight: 600; margin-bottom: 4px; }

    .tool-args, .tool-result {
      font-family: "SFMono-Regular", Consolas, monospace;
      background: #161b22;
      border-radius: 4px;
      padding: 4px 6px;
      margin-top: 2px;
      color: #a8c7fa;
      overflow-x: auto;
      white-space: pre;
    }

    .tool-result { color: #7ee787; }

    .label { font-size: 0.7rem; color: #8b949e; margin-top: 4px; }

    .bubble.thinking {
      align-self: flex-start;
      background: #161b22;
      border: 1px dashed #30363d;
      color: #8b949e;
      font-style: italic;
    }

    #input-row {
      width: 100%;
      max-width: 720px;
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }

    #input {
      flex: 1;
      padding: 10px 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e1e4e8;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
    }

    #input:focus { border-color: #58a6ff; }

    #send-btn {
      padding: 10px 18px;
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.15s;
    }

    #send-btn:hover:not(:disabled) { background: #388bfd; }
    #send-btn:disabled { background: #21262d; color: #484f58; cursor: default; }

    .hint {
      font-size: 0.75rem;
      color: #484f58;
      margin-top: 8px;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>WebMCP Chatbot Demo</h1>
  <p>Frontend → Backend (MCP client) → MCP Server (tools) → OpenAI</p>
</header>

<div id="chat-window"></div>

<div id="input-row">
  <input id="input" type="text" placeholder='Try: "What is the weather in Tokyo?" or "What time is it in New York?"' />
  <button id="send-btn">Send</button>
</div>

<p class="hint">
  Available tools: <strong>get_weather</strong> · <strong>get_current_time</strong> · <strong>search_knowledge_base</strong>
</p>

<script>
  const chatWindow = document.getElementById("chat-window");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");

  function appendBubble(role, text) {
    const el = document.createElement("div");
    el.className = `bubble ${role}`;
    el.textContent = text;
    chatWindow.appendChild(el);
    chatWindow.scrollTop = chatWindow.scrollHeight;
    return el;
  }

  function appendToolTrace(toolCallLog) {
    if (!toolCallLog?.length) return;

    const wrapper = document.createElement("div");
    wrapper.className = "tool-trace";

    const details = document.createElement("details");
    const summary = document.createElement("summary");
    summary.textContent = `🔧 ${toolCallLog.length} tool call${toolCallLog.length > 1 ? "s" : ""} made`;
    details.appendChild(summary);

    toolCallLog.forEach(({ tool, args, result }) => {
      const entry = document.createElement("div");
      entry.className = "tool-entry";
      entry.innerHTML = `
        <div class="tool-name">${tool}</div>
        <div class="label">Arguments</div>
        <div class="tool-args">${JSON.stringify(args, null, 2)}</div>
        <div class="label">Result</div>
        <div class="tool-result">${result}</div>
      `;
      details.appendChild(entry);
    });

    wrapper.appendChild(details);
    chatWindow.appendChild(wrapper);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  async function sendMessage() {
    const message = input.value.trim();
    if (!message) return;

    input.value = "";
    sendBtn.disabled = true;

    appendBubble("user", message);
    const thinking = appendBubble("thinking", "Thinking…");

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message }),
      });

      const data = await res.json();
      thinking.remove();

      if (data.error) {
        appendBubble("assistant", `Error: ${data.error}`);
      } else {
        appendBubble("assistant", data.answer);
        appendToolTrace(data.toolCallLog);
      }
    } catch (err) {
      thinking.remove();
      appendBubble("assistant", `Network error: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) sendMessage();
  });
</script>

</body>
</html>
